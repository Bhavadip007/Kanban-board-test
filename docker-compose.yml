services:
  mongo:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }" | mongosh --quiet
      interval: 5s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ./backend

    container_name: kanban-backend

    ports:
      - "5050:5050"

    env_file:
      - ./backend/.env

    depends_on:
      mongo:
        condition: service_healthy

    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend

    container_name: kanban-frontend

    ports:
      - "5173:5173"

    env_file:
      - ./frontend/.env

    depends_on:
      - backend

    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data: